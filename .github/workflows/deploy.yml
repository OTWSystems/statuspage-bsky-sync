name: Deploy
on:
  workflow_dispatch:

concurrency: one-deploy-at-a-time

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    container: ghcr.io/cargo-lambda/cargo-lambda@sha256:087f8506865ad5c5e905eed0eb4a86583441144367ba7bc4a95d36e789163cad
    environment: production

    steps:
      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885
        with:
          role-to-assume: ${{ secrets.ROLE }}
          aws-region: us-west-2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: cargo lambda build --release && cargo lambda deploy -r us-west-2
